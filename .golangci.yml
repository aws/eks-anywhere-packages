version: "2"
run:
  timeout: 5m
  build-tags:
  - exclude_graphdriver_btrfs
  - exclude_graphdriver_devicemapper
formatters:
  enable:
    - gofmt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/aws/eks-anywhere-packages)
linters:
  enable: []
  exclusions:
    paths:
    - "zz_generated.*\\.go$"
    - ".*/mocks"
    - "controllers/tilt_modules"
