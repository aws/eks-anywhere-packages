version: "2"
run:
  timeout: 5m
  build-tags:
  - exclude_graphdriver_btrfs
  - exclude_graphdriver_devicemapper
linters:
  enable:
    - gofmt
    - gci
settings:
  gci:
    sections:
    - standard
    - default
    - prefix(github.com/aws/eks-anywhere-packages)
issues:
  max-same-issues: 0
  max-issues-per-linter: 0
exclusions:
  paths:
  - "zz_generated.*\\.go$"
  - ".*/mocks"
  - "controllers/tilt_modules"
